<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAY GIRISH | Under Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />

    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --grey: #666666;
            --line: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Noise Overlay */
        .noise {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            z-index: 10;
            pointer-events: none;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2.5' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' /%3E%3C/svg%3E");
            animation: noise 0.4s steps(10) infinite;
        }

        @keyframes noise {
            0% { transform: translate3d(0,0,0); }
            10% { transform: translate3d(-1%,-1%,0); }
            20% { transform: translate3d(-2%,1%,0); }
            30% { transform: translate3d(1%,-2%,0); }
            40% { transform: translate3d(-1%,2%,0); }
            50% { transform: translate3d(-2%,1%,0); }
            60% { transform: translate3d(2%,0,0); }
            70% { transform: translate3d(0,2%,0); }
            80% { transform: translate3d(-2%,0,0); }
            90% { transform: translate3d(1%,1%,0); }
            100% { transform: translate3d(0,0,0); }
        }

        /* Grid Background */
        .grid-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            opacity: 0.5;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--grey);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { transform: scale(1.5); opacity: 0.5; box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        h1 {
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        h1 span {
            font-weight: 500;
            display: block;
        }

        .message {
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            color: var(--grey);
            max-width: 500px;
            line-height: 1.6;
        }

        /* Crosshairs */
        .crosshair {
            position: absolute;
            width: 20px; height: 20px;
            z-index: 2;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
        }
        .crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
        .crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; }

        .crosshair.top-left { top: 4vw; left: 4vw; }
        .crosshair.top-right { top: 4vw; right: 4vw; }
        .crosshair.bottom-left { bottom: 4vw; left: 4vw; }
        .crosshair.bottom-right { bottom: 4vw; right: 4vw; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="grid-bg"></div>

    <div class="crosshair top-left"></div>
    <div class="crosshair top-right"></div>
    <div class="crosshair bottom-left"></div>
    <div class="crosshair bottom-right"></div>

    <div class="container">
        <div class="status">
            <div class="dot"></div>
            SYSTEM OFFLINE
        </div>
        
        <h1>
            Under
            <span>Construction</span>
        </h1>

        <p class="message">
            The server is currently paused for maintenance and upgrades. Check back soon for the new experience.
        </p>
    </div>
</body>
</html>
